name: Reusable Deploy
on: 
    workflow_call:
        inputs:
            artifact-name:
                description: name of deployable artifact files
                required: false
                default: dist
                type: string
jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Get Code
              uses: actions/download-artifact@v7
              with:
                - name: ${{ inputs.artifact-name }}
            - name: list files
              run: ls -la
            - name: Output information
              run: echo "Deploying & Uploading"